networks:
  signal:
    driver: bridge

volumes:
  dynamodb-data:
  minio-data:
  redis-cache-data:
  redis-pubsub-data:
  redis-pushscheduler-data:
  redis-ratelimiters-data:
  redis-messagecache-data:

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports:
      - "${DYNAMODB_PORT:-8000}:8000"
    networks:
      - signal
    healthcheck:
      test: ["CMD-SHELL", "(echo > /dev/tcp/localhost/8000) 2>/dev/null && exit 0 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  redis-cache:
    image: redis:7-alpine
    ports:
      - "${REDIS_CACHE_PORT:-6379}:6379"
    volumes:
      - redis-cache-data:/data
      - ./redis-cluster/entrypoint.sh:/entrypoint.sh:ro
    networks:
      - signal
    entrypoint: ["/entrypoint.sh"]
    environment:
      REDIS_PORT: "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG && redis-cli cluster info | grep -q cluster_state:ok"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  redis-pubsub:
    image: redis:7-alpine
    ports:
      - "${REDIS_PUBSUB_PORT:-6380}:6379"
    volumes:
      - redis-pubsub-data:/data
    networks:
      - signal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-pushscheduler:
    image: redis:7-alpine
    ports:
      - "${REDIS_PUSHSCHEDULER_PORT:-6381}:6379"
    volumes:
      - redis-pushscheduler-data:/data
      - ./redis-cluster/entrypoint.sh:/entrypoint.sh:ro
    networks:
      - signal
    entrypoint: ["/entrypoint.sh"]
    environment:
      REDIS_PORT: "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG && redis-cli cluster info | grep -q cluster_state:ok"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  redis-ratelimiters:
    image: redis:7-alpine
    ports:
      - "${REDIS_RATELIMITERS_PORT:-6382}:6379"
    volumes:
      - redis-ratelimiters-data:/data
      - ./redis-cluster/entrypoint.sh:/entrypoint.sh:ro
    networks:
      - signal
    entrypoint: ["/entrypoint.sh"]
    environment:
      REDIS_PORT: "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG && redis-cli cluster info | grep -q cluster_state:ok"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  redis-messagecache:
    image: redis:7-alpine
    ports:
      - "${REDIS_MESSAGECACHE_PORT:-6383}:6379"
    volumes:
      - redis-messagecache-data:/data
      - ./redis-cluster/entrypoint.sh:/entrypoint.sh:ro
    networks:
      - signal
    entrypoint: ["/entrypoint.sh"]
    environment:
      REDIS_PORT: "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG && redis-cli cluster info | grep -q cluster_state:ok"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - signal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - signal
    volumes:
      - ./seed/dynamic-config.yaml:/seed/dynamic-config.yaml:ro
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/signal-cdn;
        mc mb --ignore-existing local/signal-attachments;
        mc mb --ignore-existing local/signal-prekeys;
        mc mb --ignore-existing local/signal-dynamic-config;
        mc mb --ignore-existing local/signal-asn;
        mc anonymous set download local/signal-cdn;
        mc cp /seed/dynamic-config.yaml local/signal-dynamic-config/dynamic-config.yaml;
        printf '' | gzip -c > /tmp/asn.tsv.gz;
        mc cp /tmp/asn.tsv.gz local/signal-asn/asn.tsv;
        echo 'MinIO buckets and seed objects initialized';
      "

  gcloud-emulators:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: >
      /bin/bash -c "
        gcloud beta emulators bigtable start --host-port=0.0.0.0:8086 &
        gcloud beta emulators firestore start --host-port=0.0.0.0:8080 &
        gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 &
        wait
      "
    ports:
      - "${FIRESTORE_EMULATOR_PORT:-8080}:8080"
      - "${PUBSUB_EMULATOR_PORT:-8085}:8085"
      - "${BIGTABLE_EMULATOR_PORT:-8086}:8086"
    networks:
      - signal

  dynamodb-init:
    image: python:3.12-slim
    depends_on:
      dynamodb-local:
        condition: service_healthy
    networks:
      - signal
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      DYNAMODB_RECREATE_ON_MISMATCH: "1"
    volumes:
      - ../scripts/init-dynamodb.py:/work/init-dynamodb.py:ro
    entrypoint:
      - /bin/sh
      - -c
      - pip install --no-cache-dir boto3 >/dev/null && python /work/init-dynamodb.py

  registration-service:
    build:
      context: ..
      dockerfile: deploy/docker/registration-service.Dockerfile
    depends_on:
      gcloud-emulators:
        condition: service_started
      redis-cache:
        condition: service_healthy
    environment:
      MICRONAUT_ENVIRONMENTS: dev,local
      MICRONAUT_CONFIG_FILES: /config/application-local.yml
      BIGTABLE_EMULATOR_HOST: gcloud-emulators:8086
      FIRESTORE_EMULATOR_HOST: gcloud-emulators:8080
      PUBSUB_EMULATOR_HOST: gcloud-emulators:8085
      GOOGLE_CLOUD_PROJECT: signal-local
    volumes:
      - ./config/registration-service.yml:/config/application-local.yml:ro
    ports:
      - "${REGISTRATION_GRPC_PORT:-50051}:50051"
    networks:
      - signal

  signal-server:
    build:
      context: ..
      dockerfile: deploy/docker/Signal-Server.Dockerfile
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      redis-cache:
        condition: service_healthy
      redis-pubsub:
        condition: service_healthy
      redis-pushscheduler:
        condition: service_healthy
      redis-ratelimiters:
        condition: service_healthy
      redis-messagecache:
        condition: service_healthy
      registration-service:
        condition: service_started
    environment:
      JAVA_TOOL_OPTIONS: "-Dsecrets.bundle.filename=/config/generated/secrets-bundle.yml -Xmx${SIGNAL_SERVER_XMX:-2g}"
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL_DYNAMODB: http://dynamodb-local:8000
      AWS_ENDPOINT_URL_S3: http://minio:9000
    ports:
      - "${SIGNAL_API_PORT:-8090}:8080"
      - "${SIGNAL_HTTPS_PORT:-9443}:8443"
      - "${SIGNAL_ADMIN_PORT:-8091}:8081"
      - "${SIGNAL_GRPC_PORT:-50052}:50051"
    volumes:
      - ./generated/signal-server.yml:/config/config.yml:ro
      - ./generated/secrets-bundle.yml:/config/generated/secrets-bundle.yml:ro
      - ./generated/localhost-keystore.p12:/config/generated/localhost-keystore.p12:ro
    networks:
      - signal
    command: ["server", "/config/config.yml"]
